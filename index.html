      rel="stylesheet"
    />
    <script>
      // GitHub Pages SPA fallback: restore the real path from the ?/ redirect
      // produced by 404.html. No effect during local development.
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&')
            })
            .join('?')
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash)
        }
      })(window.location)
    </script>
    <script>
      // Apply theme before first paint to avoid a flash of wrong theme.
      // First-time visitors always start in light mode; an explicit toggle
      // choice is saved and respected on repeat visits.
      (function () {
        document.documentElement.dataset.theme = localStorage.getItem('theme') || 'light'
      })()
    </script>
  </head>

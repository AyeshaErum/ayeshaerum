<!doctype html>
<!-- GitHub Pages SPA fallback (spa-github-pages technique).
     GH Pages serves this for unknown paths like /about; it redirects to
     /?/about, and the matching script in index.html restores the real URL. -->
<html>
  <head>
    <meta charset="utf-8" />
    <title>Ayesha Erum — Portfolio</title>
    <script>
      var segmentCount = 1 // 1 = site served from a repo subpath (username.github.io/repo-name)
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + segmentCount)
            .join('/') +
          '/?/' +
          l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      )
    </script>
  </head>
  <body></body>
</html>
